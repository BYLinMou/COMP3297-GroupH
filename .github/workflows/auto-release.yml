name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (e.g. v1.2.3 or v1.2.3-alpha.1)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease (for alpha/beta)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        if: ${{ github.event_name != 'workflow_run' }}

      - name: Checkout workflow_run commit
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'workflow_run' }}
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check whether release should run
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "No parent commit detected. Keep release enabled."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SHOULD_RUN="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == "README.md" || "$file" == "AGENTS.md" || "$file" == .github/workflows/* ]]; then
              continue
            fi
            SHOULD_RUN="true"
            break
          done <<< "$CHANGED_FILES"

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Resolve release metadata
        id: meta
        if: ${{ steps.scope.outputs.should_run == 'true' }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            if [[ ! -f VERSION ]]; then
              echo "VERSION file not found. Please create VERSION in repo root."
              exit 1
            fi

            TAG="$(tr -d '[:space:]' < VERSION)"
            if [[ -z "$TAG" ]]; then
              echo "VERSION file is empty."
              exit 1
            fi
          fi

          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PRERELEASE="${{ inputs.prerelease }}"
            COMMIT_SHA="${{ github.sha }}"
          else
            PRERELEASE="false"
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: ${{ steps.scope.outputs.should_run == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: Release ${{ steps.meta.outputs.tag }}
          commit: ${{ steps.meta.outputs.commit_sha }}
          generateReleaseNotes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          allowUpdates: true
          skipIfReleaseExists: false

      - name: Skip release for docs/workflow-only changes
        if: ${{ steps.scope.outputs.should_run != 'true' }}
        run: echo "Skipping release because only README.md, AGENTS.md, or .github/workflows/** changed."
