name: CI

on:
  push:
    paths-ignore:
      - README.md
      - AGENTS.md
  pull_request:
    paths-ignore:
      - README.md
      - AGENTS.md

jobs:
  django-checks:
    runs-on: ubuntu-latest
    env:
      ENABLE_DJANGO_TENANTS: "False"
      DATABASE_URL: "sqlite:///./db.sqlite3"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            pip install "django>=5.2,<5.3"
          fi

      - name: Django system check
        run: python manage.py check

      - name: Check missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run unit and frontend tests
        run: python manage.py test defects.testsuite.test_services frontend.tests --verbosity 2

      - name: Run API endpoint tests with APIClient
        run: python manage.py test defects.testsuite.test_api_client --verbosity 2

      - name: Run direct view tests with APIRequestFactory
        run: python manage.py test defects.testsuite.test_views_request_factory --verbosity 2

      - name: Verify defects.tests compatibility entrypoint
        run: python manage.py test defects.tests --verbosity 2

      - name: Run branch coverage
        run: python -m coverage run --branch manage.py test

      - name: Print coverage summary
        run: python -m coverage report

      - name: Export coverage artifacts
        run: |
          python -m coverage xml -o coverage.xml
          python -m coverage html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  tenant-mode-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: betatrax
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d betatrax"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENABLE_DJANGO_TENANTS: "True"
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/betatrax"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver,tenant.test.com,platform.test.com"
      PUBLIC_SCHEMA_DOMAINS: "platform.test.com"
      SHOW_PUBLIC_IF_NO_TENANT_FOUND: "True"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            pip install "django>=5.2,<5.3"
          fi

      - name: Django tenant-mode system check
        run: python manage.py check

      - name: Run tenant-mode test suite
        run: python manage.py test --verbosity 2
