name: CI

on:
  push:
    paths-ignore:
      - README.md
      - AGENTS.md
  pull_request:
    paths-ignore:
      - README.md
      - AGENTS.md

jobs:
  django-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            pip install "django>=5.2,<5.3"
          fi

      - name: Django system check
        run: python manage.py check

      - name: Check missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run discovered test suite
        run: python manage.py test --verbosity 2

      - name: Verify defects.tests compatibility entrypoint
        run: python manage.py test defects.tests --verbosity 2

      - name: Run branch coverage
        run: python -m coverage run --branch manage.py test

      - name: Print coverage summary
        run: python -m coverage report

      - name: Export coverage artifacts
        run: |
          python -m coverage xml -o coverage.xml
          python -m coverage html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
