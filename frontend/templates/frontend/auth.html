{% extends 'frontend/base.html' %}

{% block title %}Auth Mock - BetaTrax{% endblock %}
{% block header_actions %}
<a class="action-link" href="{% url 'frontend:home' %}">Home</a>
{% endblock %}

{% block content %}
<section class="card hero">
  <h1>External Authorization Mock</h1>
  <p>Mock identity check before protected actions.</p>
</section>

<section class="card">
  <div class="field"><label>User ID</label><input placeholder="owner-001 / dev-001" /></div>
  <div class="field"><label>Password</label><input type="password" placeholder="Enter password" /></div>
  <div class="actions">
    <button class="primary" data-status-target="auth-status" data-message="Authentication successful.">Authenticate</button>
    <button class="warn" data-status-target="auth-status" data-message="Authentication failed." data-tone="error">Simulate Failure</button>
  </div>
  <div id="auth-status" class="status-box">No authentication attempt yet.</div>
</section>
{% endblock %}
